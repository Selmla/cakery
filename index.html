<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<body>
    <section class="garland"></section>

        <div class="logo">
            <img src="images/logo.png" alt="Munamii Cakery logo">
        </div>

        <nav>
            <ul class="nav-links">
                <a href="index.html">Home</a>
